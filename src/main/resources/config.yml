# ====================================================
#              sdf1 插件配置文件 (1.21.4)
#           欢迎 DIY！请务必保持格式对齐
# ====================================================

# [核心版本设置]
# 提示：如果将 version 设为 "999" 或 "false"，插件将停止启动时的自动更新检查。
version: "1.0"
# 是否开启自动检查更新 (true 为开启, false 为关闭)
check-update: true

# [数据库配置]
# 这里的名字必须与你服务器计分板 (Scoreboard) 的名字完全一致
scoreboard-names:
  main: "abc"    # 主计分板：存放口令名和对应分数
  record: "def"  # 记录计分板：存放 0 分奖励的领取记录 (格式为：口令_玩家名)

# [管理员名单]
# 只有在这里的玩家或 OP 才能执行 /sdf1 reload/admin/update 指令
# 格式示范: "Player1,Player2,MyAdmin"
admin-whitelist: ""

# [奖励规则]
# 格式为 "分数: 金额"。玩家在 {main} 计分板的分数达到 key，就发放对应的 money。
# 特殊规则：
# - 分数为 0：属于永久口令，每个玩家限领一次，记录在 {record}。
# - 分数 > 0：属于一次性口令，领完后分数变为 -1。
reward-rules:
  "0": 10.0
  "1": 10.0
  "100": 50.0

# [自定义消息体系]
# ----------------------------------------------------
# 你可以自由 DIY 这里的文字，支持颜色代码 '&'
# 可用变量：
# {name}   - 玩家实际输入的文字
# {entry}  - 数据库里对应的原始正确口令 (如果不匹配则显示 NULL)
# {board}  - 你在上面设置的 main 计分板名字
# {amount} - 奖励的金额
# {score}  - 该口令在计分板上的分数
# {latest} - 远程 GitHub 仓库最新的版本号
# {version}- 你当前配置文件里的版本号
# ----------------------------------------------------
messages:
  no-permission: "&c[权限] 抱歉，你没有权限执行这个管理指令！"
  only-player: "&c[错误] 领奖口令必须由玩家在游戏内输入。"
  input-hint: "&b[验证系统] &f请在聊天栏输入口令 (当前库: &e{board}&f) [输入 0 取消]："
  cancel-msg: "&6[提示] &f你已取消本次验证。"

  # 验证失败类 (由于隐私保护，默认不打印 {entry})
  not-found: "&c[无效] &f未找到口令 &e{name} &f，请检查拼写或大小写。"
  already-claimed: "&e[重复] &f这个礼包你已经领过啦，换一个试试吧！"
  used-up: "&c[失效] &f该口令已被他人抢先兑换或已过期。"
  system-issue: "&4[故障] &f数据异常 (Score:{score})，请截图联系管理员处理。"

  # 验证成功
  success-pay: "&a[成功] &f验证通过！恭喜获得 &6{amount} &f金币。"

  # 更新逻辑相关
  update-found: "&b[更新] &f发现新版本 &eV{latest}&f！当前版本 &7V{version}&f，请前往 GitHub 更新。"
  update-latest: "&a[状态] &f插件已是最新版本，无需更新。"
  update-circuit-break: "&7[安全保护] 连续 3 次连接 GitHub 失败，已熔断自动更新逻辑以节省带宽。"